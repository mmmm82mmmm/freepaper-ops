<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>運転手画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f0e8; --card:#fff; --ink:#1a1a1a; --muted:#888;
  --border:#e0dbd0; --green:#1a8a4a; --amber:#c47a0a;
  --blue:#1a5cd4; --red:#d42020;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:80px;}

/* HEADER */
.app-header{background:var(--ink);color:white;padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.app-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-title{font-size:15px;font-weight:900;}
.month-badge{font-size:11px;background:#333;padding:4px 10px;border-radius:20px;}

/* TABS */
.tabs{display:flex;border-top:1px solid #333;}
.tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:white;border-bottom-color:var(--green);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted);}

/* SCREEN */
.screen{display:none;padding:16px;}
.screen.active{display:block;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.kpi-card{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.kpi-card.green .kpi-val{color:var(--green);}
.kpi-card.amber .kpi-val{color:var(--amber);}
.kpi-card.blue .kpi-val{color:var(--blue);}
.kpi-card.muted .kpi-val{color:var(--muted);}

/* PROGRESS BAR */
.progress-section{background:var(--card);border-radius:12px;padding:14px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.progress-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;}
.progress-bar-bg{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#2dd472);border-radius:5px;transition:width 1s ease;}
.progress-segments{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:1px;}
.seg-done{background:var(--green);}
.seg-absent{background:var(--amber);}
.seg-todo{background:var(--border);}

/* WORKER LIST */
.section-title{font-size:12px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:16px;}

.worker-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid var(--border);}
.worker-card.has-done{border-left-color:var(--green);}
.worker-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.worker-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:white;flex-shrink:0;}
.worker-name{font-size:15px;font-weight:900;}
.worker-status{font-size:11px;color:var(--muted);}
.worker-stats{display:flex;gap:8px;}
.worker-stat{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;}
.worker-stat .val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;display:block;}
.worker-stat .lbl{font-size:9px;color:var(--muted);margin-top:2px;}
.worker-stat.green .val{color:var(--green);}
.worker-stat.amber .val{color:var(--amber);}
.worker-stat.muted .val{color:var(--muted);}

/* ROUTE LIST */
.route-section{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.route-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.route-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:var(--ink);color:white;padding:3px 8px;border-radius:4px;}
.route-name{font-size:13px;font-weight:700;flex:1;}
.route-stats{display:flex;gap:8px;font-size:11px;}
.route-stat-done{color:var(--green);font-weight:700;}
.route-stat-absent{color:var(--amber);font-weight:700;}
.route-stat-todo{color:var(--muted);}
.route-toggle{font-size:12px;color:var(--muted);}

.route-items{display:none;}
.route-items.open{display:block;}

.route-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.route-item:last-child{border-bottom:none;}
.item-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-status.done{background:var(--green);}
.item-status.absent{background:var(--amber);}
.item-status.todo{background:var(--border);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.item-worker{font-size:10px;color:var(--blue);font-weight:700;}
.item-nabon{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* REFRESH BTN */
.refresh-btn{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--ink);color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:200;}
.refresh-btn:active{transform:scale(.95);}
.refresh-btn.spinning{animation:spin .8s linear infinite;}

/* ERROR */
.error-box{margin:20px 0;padding:16px;background:#fde8e8;border:1px solid #f0a0a0;border-radius:10px;font-size:13px;color:var(--red);line-height:1.6;}

/* LAST UPDATE */
.last-update{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;}

/* ASSIGN */
.assign-group{background:var(--card);border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.assign-group-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
.assign-group-code{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;background:var(--ink);color:white;padding:3px 8px;border-radius:4px;min-width:36px;text-align:center;}
.assign-group-info{flex:1;font-size:12px;color:var(--muted);}
.assign-group-worker{font-size:12px;font-weight:700;color:var(--blue);}
.assign-btn-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;}
.assign-worker-btn{padding:8px 14px;border-radius:20px;border:2px solid var(--border);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:white;color:var(--ink);transition:all .15s;}
.assign-worker-btn:active{transform:scale(.95);}
.assign-worker-btn.assigned{background:var(--blue);color:white;border-color:var(--blue);}
.assign-worker-btn.returned{background:#e8f5e9;color:var(--green);border-color:var(--green);}
.returned-chip{padding:8px 14px;border-radius:20px;background:#e8f5e9;border:2px solid var(--green);font-size:12px;font-weight:700;color:var(--green);cursor:default;}

/* CAR PANEL */
.car-panel{background:var(--card);border-radius:10px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);min-height:80px;}
.car-panel-title{font-size:11px;font-weight:900;margin-bottom:8px;color:var(--ink);}
.car-worker-list{display:flex;flex-direction:column;gap:4px;}
.car-worker-chip{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;background:var(--bg);font-size:11px;font-weight:700;}
.car-worker-chip .move-btn{font-size:10px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:white;cursor:pointer;color:var(--muted);}
.car-worker-chip.returned{background:#e8f5e9;color:var(--green);}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-top">
    <div class="app-title">🚐 運転手画面</div>
    <select id="month-badge" onchange="changeMonth(this.value)" style="font-size:11px;background:#333;color:white;border:none;padding:4px 8px;border-radius:20px;font-family:'Noto Sans JP',sans-serif;font-weight:700;"></select>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('progress')">📊 進捗確認</div>
    <div class="tab" onclick="switchTab('route')">🗺️ ルート別</div>
    <div class="tab" onclick="switchTab('assign')">👥 グループ割当</div>
  </div>
</div>

<!-- 進捗タブ -->
<div class="screen active" id="screen-progress">
  <div class="loading" id="loading-progress">
    <div class="spinner"></div>
    <div class="loading-text">データを読み込んでいます...</div>
  </div>
  <div id="progress-content" style="display:none">
    <div class="error-box" id="progress-error" style="display:none"></div>

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-label">完了</div>
        <div class="kpi-val" id="kpi-done">0</div>
        <div class="kpi-sub">件</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">不在</div>
        <div class="kpi-val" id="kpi-absent">0</div>
        <div class="kpi-sub">件</div>
      </div>
      <div class="kpi-card muted">
        <div class="kpi-label">未着手</div>
        <div class="kpi-val" id="kpi-todo">0</div>
        <div class="kpi-sub">件</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">総件数</div>
        <div class="kpi-val" id="kpi-total">0</div>
        <div class="kpi-sub">件</div>
      </div>
    </div>

    <!-- 進捗バー -->
    <div class="progress-section">
      <div class="progress-label">
        <span>全体進捗</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-segments" id="progress-segments"></div>
    </div>

    <!-- 作業者別 -->
    <div class="section-title">作業者別</div>
    <div id="worker-list"></div>

    <div class="last-update" id="last-update"></div>
  </div>
</div>

<!-- ルート別タブ -->
<div class="screen" id="screen-route">
  <div class="loading" id="loading-route" style="display:none">
    <div class="spinner"></div>
    <div class="loading-text">読み込み中...</div>
  </div>
  <div id="route-content"></div>
</div>

<!-- グループ割当スクリーン -->
<div class="screen" id="screen-assign">

  <!-- 車の編成 -->
  <div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-title" style="margin:0">🚐 車の編成</div>
      <button onclick="loadAssignData()" style="padding:6px 12px;background:var(--ink);color:white;border:none;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer;">🔄 更新</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select id="new-worker-select" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--card);">
        <option value="">-- 作業者を選択 --</option>
      </select>
      <button onclick="addWorkerFromSelect()" style="padding:8px 14px;background:var(--green);color:white;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">追加</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="car-panel" id="car-panel-1">
        <div class="car-panel-title">🚐 1号車</div>
        <div class="car-worker-list" id="car-1"></div>
      </div>
      <div class="car-panel" id="car-panel-2">
        <div class="car-panel-title">🚐 2号車</div>
        <div class="car-worker-list" id="car-2"></div>
      </div>
      <div class="car-panel" id="car-panel-0">
        <div class="car-panel-title" style="color:var(--muted)">未割当</div>
        <div class="car-worker-list" id="car-0"></div>
      </div>
    </div>
  </div>

  <!-- 戻り報告 -->
  <div style="margin-bottom:16px">
    <div class="section-title">戻り待ち作業者</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px">1号車</div>
        <div id="returned-list-1" style="display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:8px;background:var(--card);border-radius:8px;border:2px dashed var(--border);"></div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px">2号車</div>
        <div id="returned-list-2" style="display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:8px;background:var(--card);border-radius:8px;border:2px dashed var(--border);"></div>
      </div>
    </div>
  </div>

  <!-- グループ割当 -->
  <div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="section-title" style="margin:0">グループ割当</div>
      <select id="route-filter" onchange="renderAssign()" style="padding:6px 10px;border:2px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:11px;background:var(--card);">
        <option value="">全ルート</option>
      </select>
      <select id="car-filter" onchange="renderAssign()" style="padding:6px 10px;border:2px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:11px;background:var(--card);">
        <option value="">全車</option>
        <option value="1">1号車</option>
        <option value="2">2号車</option>
      </select>
    </div>
    <div id="assign-list"></div>
  </div>
</div>

<!-- 更新ボタン -->
<button class="refresh-btn" id="refresh-btn" onclick="loadData()">🔄</button>

<script>
const PROXY = 'https://kintone-proxy.mmmm82mmmm.workers.dev';
const BASE = `${PROXY}/kintone/v1`;
const TOKEN = 'jQ9OU3Kp6CWMmeD1WnA32M6VPdxpt1e5La7gilcF';
const APP = 269;
const DOMAIN = 'white';

const WORKER_COLORS = ['#e8401c','#1a5cd4','#1a8a4a','#9c1a8a','#c47a0a','#0a8ab4','#d42020','#5c4a1a'];

let allRecords = [];
let currentMonth = '';
let assignState = { cars: {}, assignments: {}, returned: [], updatedAt: '' };
let allGroups = []; // 全グループコード一覧
let workerList = []; // 作業者一覧

// 作業月を選択（画面上部に選択肢を表示）
const now = new Date();
const months = [];
for (let i = -1; i <= 2; i++) {
  const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
  months.push(`${d.getFullYear()}年${d.getMonth()+1}月号`);
}
// デフォルトは来月（通常は翌月号を配布）
currentMonth = months[2];

async function kintoneGet(query) {
  const q = encodeURIComponent(query);
  const res = await fetch(`${BASE}/records.json?app=${APP}&query=${q}&subdomain=${DOMAIN}`, {
    headers: { 'X-Cybozu-API-Token': TOKEN }
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || `APIエラー: ${res.status}`);
  }
  const data = await res.json();
  return data.records;
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    // 今月のデータを全件取得（500件ずつ）
    const query = `文字列__1行_ = "${currentMonth}" order by 文字列__1行__4 asc, 数値_1 asc limit 500`;
    allRecords = await kintoneGet(query);

    document.getElementById('month-badge').textContent = currentMonth;
    renderProgress();
    renderRoute();
    await loadAssignData();

    document.getElementById('last-update').textContent =
      `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;

  } catch(e) {
    document.getElementById('progress-error').style.display = 'block';
    document.getElementById('progress-error').textContent = `⚠️ ${e.message}`;
  } finally {
    btn.classList.remove('spinning');
    document.getElementById('loading-progress').style.display = 'none';
    document.getElementById('progress-content').style.display = 'block';
  }
}

function getStatus(r) {
  return r['ドロップダウン']?.value || '未着手';
}

function renderProgress() {
  const done = allRecords.filter(r => getStatus(r) === '完了').length;
  const absent = allRecords.filter(r => getStatus(r) === '不在').length;
  const todo = allRecords.filter(r => getStatus(r) === '未着手').length;
  const total = allRecords.length;

  document.getElementById('kpi-done').textContent = done;
  document.getElementById('kpi-absent').textContent = absent;
  document.getElementById('kpi-todo').textContent = todo;
  document.getElementById('kpi-total').textContent = total;

  const pct = total > 0 ? Math.round((done + absent) / total * 100) : 0;
  document.getElementById('progress-pct').textContent = `${pct}%`;

  // 進捗バー
  const seg = document.getElementById('progress-segments');
  seg.innerHTML = '';
  if (total > 0) {
    const donePct = done / total * 100;
    const absentPct = absent / total * 100;
    const todoPct = todo / total * 100;
    if (donePct > 0) seg.innerHTML += `<div class="seg-done" style="flex:${donePct}" title="完了:${done}件"></div>`;
    if (absentPct > 0) seg.innerHTML += `<div class="seg-absent" style="flex:${absentPct}" title="不在:${absent}件"></div>`;
    if (todoPct > 0) seg.innerHTML += `<div class="seg-todo" style="flex:${todoPct}" title="未着手:${todo}件"></div>`;
  }

  // 作業者別集計
  const workerMap = {};
  allRecords.forEach(r => {
    const worker = r['文字列__1行__10']?.value || '未割当';
    if (!workerMap[worker]) workerMap[worker] = { done:0, absent:0, todo:0 };
    const s = getStatus(r);
    if (s === '完了') workerMap[worker].done++;
    else if (s === '不在') workerMap[worker].absent++;
    else workerMap[worker].todo++;
  });

  const workerList = document.getElementById('worker-list');
  workerList.innerHTML = '';

  Object.entries(workerMap)
    .sort((a,b) => (b[1].done + b[1].absent) - (a[1].done + a[1].absent))
    .forEach(([name, stats], idx) => {
      const color = WORKER_COLORS[idx % WORKER_COLORS.length];
      const total = stats.done + stats.absent + stats.todo;
      const hasDone = stats.done > 0 || stats.absent > 0;
      workerList.innerHTML += `
        <div class="worker-card ${hasDone ? 'has-done' : ''}">
          <div class="worker-header">
            <div class="worker-avatar" style="background:${color}">${name[0]}</div>
            <div>
              <div class="worker-name">${name}</div>
              <div class="worker-status">${total}件担当</div>
            </div>
          </div>
          <div class="worker-stats">
            <div class="worker-stat green"><span class="val">${stats.done}</span><div class="lbl">完了</div></div>
            <div class="worker-stat amber"><span class="val">${stats.absent}</span><div class="lbl">不在</div></div>
            <div class="worker-stat muted"><span class="val">${stats.todo}</span><div class="lbl">未着手</div></div>
          </div>
        </div>`;
    });
}

function renderRoute() {
  const routeMap = {};
  allRecords.forEach(r => {
    const route = r['文字列__1行__4']?.value || '未設定';
    if (!routeMap[route]) routeMap[route] = [];
    routeMap[route].push(r);
  });

  const content = document.getElementById('route-content');
  content.innerHTML = '';

  Object.entries(routeMap).sort().forEach(([route, records]) => {
    const done = records.filter(r => getStatus(r) === '完了').length;
    const absent = records.filter(r => getStatus(r) === '不在').length;
    const todo = records.filter(r => getStatus(r) === '未着手').length;

    const items = records.map(r => {
      const status = getStatus(r);
      const statusClass = status === '完了' ? 'done' : status === '不在' ? 'absent' : 'todo';
      const worker = r['文字列__1行__10']?.value || '';
      const shop = r['文字列__1行__1']?.value || '';
      const floor = r['文字列__1行__3']?.value || '';
      const nabon = r['数値']?.value || '';
      const henkyaku = r['数値_0']?.value || '';
      return `
        <div class="route-item">
          <div class="item-status ${statusClass}"></div>
          <div class="item-info">
            <div class="item-name">${shop}</div>
            <div class="item-meta">${floor ? floor+'階 ' : ''}${worker ? `<span class="item-worker">${worker}</span>` : ''}</div>
          </div>
          <div class="item-nabon">${nabon ? `${nabon}冊` : ''}</div>
        </div>`;
    }).join('');

    content.innerHTML += `
      <div class="route-section">
        <div class="route-header" onclick="toggleRoute('route-${route}')">
          <div class="route-badge">ルート${route}</div>
          <div class="route-name">${records.length}件</div>
          <div class="route-stats">
            <span class="route-stat-done">✓${done}</span>
            <span class="route-stat-absent">不在${absent}</span>
            <span class="route-stat-todo">未${todo}</span>
          </div>
          <div class="route-toggle" id="toggle-${route}">▼</div>
        </div>
        <div class="route-items" id="route-${route}">
          ${items}
        </div>
      </div>`;
  });
}

function toggleRoute(id) {
  const el = document.getElementById(id);
  const route = id.replace('route-', '');
  const toggle = document.getElementById('toggle-' + route);
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    toggle.textContent = '▼';
  } else {
    el.classList.add('open');
    toggle.textContent = '▲';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'assign') renderAssign();
}

// 月選択セレクトを初期化
function initMonthSelect() {
  const sel = document.getElementById('month-badge');
  months.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === currentMonth) o.selected = true;
    sel.appendChild(o);
  });
}

function changeMonth(month) {
  currentMonth = month;
  loadData();
}

// ===== グループ割当 =====
async function loadAssignData() {
  try {
    const recs = await kintoneGet(`文字列__1行_ = "${currentMonth}" order by レコード番号 asc limit 1`);
    if (recs.length) {
      const raw = recs[0]['文字列__複数行__0']?.value || '';
      try { assignState = JSON.parse(raw); } catch(e) { assignState = { cars:{}, assignments:{}, returned:[], updatedAt:'' }; }
      if (!assignState.cars) assignState.cars = {};
    }

    // グループ・作業者一覧を収集
    const groupSet = new Set();
    const workerSet = new Set();
    allRecords.forEach(r => {
      const g = r['文字列__1行__0']?.value;
      if (g) groupSet.add(g);
    });
    allGroups = [...groupSet].sort((a, b) => {
      const routeA = a.replace(/[0-9]/g, '');
      const routeB = b.replace(/[0-9]/g, '');
      if (routeA !== routeB) return routeA.localeCompare(routeB);
      const numA = parseFloat(a.replace(/[^0-9]/g, '')) || 0;
      const numB = parseFloat(b.replace(/[^0-9]/g, '')) || 0;
      return numA - numB;
    });

    // 作業者はWORKER_COLORSベースで全員リストアップ
    // ルートフィルタ更新
    const routes = [...new Set(allGroups.map(g => g.replace(/[0-9]/g,'')))].sort();
    const sel = document.getElementById('route-filter');
    const cur = sel?.value || '';
    if (sel) {
      sel.innerHTML = '<option value="">全ルート</option>';
      routes.forEach(r => {
        const o = document.createElement('option');
        o.value = r; o.textContent = `ルート${r.toUpperCase()}`;
        if (r === cur) o.selected = true;
        sel.appendChild(o);
      });
    }

    // 作業者セレクトを更新
    const memberSel = document.getElementById('new-worker-select');
    if (memberSel) {
      const memberList = assignState.members || [];
      const existingWorkers = Object.keys(assignState.cars || {});
      memberSel.innerHTML = '<option value="">-- 作業者を選択 --</option>';
      memberList.filter(m => !existingWorkers.includes(m)).forEach(m => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        memberSel.appendChild(o);
      });
    }

    renderCars();
    renderAssign();
  } catch(e) { console.error('割当データ取得エラー:', e); }
}

function renderCars() {
  // 全作業者を収集（割当JSONに含まれる人 + 戻り報告した人）
  const allWorkers = [...new Set([
    ...Object.keys(assignState.cars || {}),
    ...(assignState.returned || []),
    ...Object.keys(assignState.assignments || {}),
  ])].filter(w => w);

  // 未登録の作業者も「未割当」として表示
  [1, 2, 0].forEach(carNum => {
    const el = document.getElementById('car-' + carNum);
    if (!el) return;
    const workers = allWorkers.filter(w => (assignState.cars[w] || 0) === carNum);
    if (workers.length === 0) {
      el.innerHTML = '<div style="font-size:11px;color:var(--muted)">なし</div>';
      return;
    }
    el.innerHTML = workers.map(w => {
      const isReturned = (assignState.returned || []).includes(w);
      const otherCar = carNum === 1 ? 2 : 1;
      const moveBtn = carNum !== 0
        ? `<button class="move-btn" onclick="moveCar('${w}',${otherCar})">${otherCar}号車へ</button>`
        : `<button class="move-btn" onclick="moveCar('${w}',1)">1号車</button><button class="move-btn" onclick="moveCar('${w}',2)" style="margin-left:2px">2号車</button>`;
      return `<div class="car-worker-chip ${isReturned ? 'returned' : ''}">
        <span>${isReturned ? '🏃 ' : ''}${w}</span>
        <span style="display:flex;gap:2px">${moveBtn}</span>
      </div>`;
    }).join('');
  });

  // 戻り待ちリスト（車別）
  [1, 2].forEach(carNum => {
    const el = document.getElementById('returned-list-' + carNum);
    if (!el) return;
    const returned = (assignState.returned || []).filter(w => (assignState.cars[w] || 0) === carNum);
    el.innerHTML = returned.length
      ? returned.map(w => `<div class="returned-chip">🏃 ${w}</div>`).join('')
      : '<div style="color:var(--muted);font-size:11px;align-self:center">なし</div>';
  });
}

async function addWorkerFromSelect() {
  const sel = document.getElementById('new-worker-select');
  const name = sel.value;
  if (!name) return;
  if (!assignState.cars) assignState.cars = {};
  if (assignState.cars[name] !== undefined) {
    alert(`「${name}」はすでに追加されています`);
    return;
  }
  assignState.cars[name] = 0;
  assignState.updatedAt = new Date().toISOString();
  await saveAssign();
  sel.value = '';
  renderCars();
}

async function moveCar(workerName, carNum) {
  if (!assignState.cars) assignState.cars = {};
  assignState.cars[workerName] = carNum;
  assignState.updatedAt = new Date().toISOString();
  await saveAssign();
  renderCars();
  renderAssign();
}

// 作業者を新規追加
async function addWorker(name) {
  if (!name) return;
  if (!assignState.cars) assignState.cars = {};
  assignState.cars[name] = 0; // 未割当
  assignState.updatedAt = new Date().toISOString();
  await saveAssign();
  renderCars();
}

async function saveAssign() {
  const recs = await kintoneGet(`文字列__1行_ = "${currentMonth}" order by レコード番号 asc limit 1`);
  if (!recs.length) throw new Error('レコードが見つかりません');
  const id = recs[0]['$id'].value;
  const params = new URLSearchParams({ subdomain: 'white' });
  const res = await fetch(`${PROXY}/k/v1/record.json?${params}`, {
    method: 'PUT',
    headers: { 'X-Cybozu-API-Token': TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ app: APP, id, record: { '文字列__複数行__0': { value: JSON.stringify(assignState, null, 2) } } })
  });
  if (!res.ok) throw new Error('保存失敗');
}

async function assignWorker(groupCode, workerName) {
  // 既存の割当を外す
  Object.keys(assignState.assignments).forEach(w => {
    if (assignState.assignments[w] === groupCode) delete assignState.assignments[w];
  });
  if (workerName) {
    assignState.assignments[workerName] = groupCode;
    // returnedから外す
    assignState.returned = assignState.returned.filter(w => w !== workerName);
  }
  assignState.updatedAt = new Date().toISOString();
  await saveAssign();
  renderAssign();
}

function renderAssign() {
  const routeFilter = document.getElementById('route-filter')?.value || '';
  const carFilter = document.getElementById('car-filter')?.value || '';

  const assignEl = document.getElementById('assign-list');
  let filtered = routeFilter ? allGroups.filter(g => g.startsWith(routeFilter)) : allGroups;

  if (!filtered.length) {
    assignEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:16px;text-align:center">データなし</div>';
    return;
  }

  // グループの店舗数を集計
  const groupCounts = {}, groupDone = {};
  allRecords.forEach(r => {
    const g = r['文字列__1行__0']?.value;
    if (!g) return;
    groupCounts[g] = (groupCounts[g] || 0) + 1;
    if (r['ドロップダウン']?.value === '完了' || r['ドロップダウン']?.value === '不在') {
      groupDone[g] = (groupDone[g] || 0) + 1;
    }
  });

  // 作業者ボタン（車フィルタあれば該当車の作業者のみ）
  const allWorkers = [...new Set([
    ...Object.keys(assignState.cars || {}),
    ...(assignState.returned || []),
    ...Object.keys(assignState.assignments || {}),
  ])].filter(w => w);

  const filteredWorkers = carFilter
    ? allWorkers.filter(w => String(assignState.cars?.[w] || 0) === carFilter)
    : allWorkers;

  assignEl.innerHTML = filtered.map(g => {
    const assignedWorker = Object.entries(assignState.assignments || {}).find(([w, grp]) => grp === g)?.[0] || '';
    const count = groupCounts[g] || 0;
    const done = groupDone[g] || 0;
    const isDone = count > 0 && done >= count;
    const assignedCar = assignedWorker ? (assignState.cars?.[assignedWorker] || 0) : 0;
    const carLabel = assignedCar ? `🚐${assignedCar}` : '';

    const workerBtns = filteredWorkers.map(w => {
      const isAssigned = assignedWorker === w;
      const isReturned = (assignState.returned || []).includes(w);
      const carNum = assignState.cars?.[w] || 0;
      const carTag = carNum ? `<span style="font-size:9px;opacity:0.7"> ${carNum}号車</span>` : '';
      const cls = isAssigned ? 'assigned' : isReturned ? 'returned' : '';
      return `<button class="assign-worker-btn ${cls}" onclick="assignWorker('${g}','${w}')">${w}${carTag}</button>`;
    }).join('');

    return `
      <div class="assign-group" style="${isDone ? 'opacity:0.5' : ''}">
        <div class="assign-group-header">
          <div class="assign-group-code">${g}</div>
          <div class="assign-group-info">${count}件 ${done > 0 ? `(完了${done})` : ''}</div>
          <div class="assign-group-worker">${assignedWorker ? `${carLabel} 👤 ${assignedWorker}` : '未割当'}</div>
        </div>
        <div class="assign-btn-row">
          ${workerBtns}
          ${assignedWorker ? `<button class="assign-worker-btn" onclick="assignWorker('${g}','')" style="color:var(--red);border-color:var(--red)">✕ 解除</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

// 起動時に読み込み
initMonthSelect();
loadData();

// 30秒ごとに自動更新
setInterval(loadData, 30000);
</script>
